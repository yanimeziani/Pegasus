services:
  pegasus-web:
    build:
      context: ../../
      dockerfile: web/Dockerfile
    container_name: pegasus-web
    restart: unless-stopped
    environment:
      PEGASUS_WEB_HOST: 0.0.0.0
      PEGASUS_WEB_PORT: 8080
    networks:
      - pegasus-net

  pegasus-api:
    build:
      context: ../../backend/pegasus-api
      dockerfile: Dockerfile
    container_name: pegasus-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pegasus-data:/data/cerberus
    networks:
      - pegasus-net

  caddy:
    image: caddy:2.8
    container_name: pegasus-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - pegasus-web
      - pegasus-api
    networks:
      - pegasus-net

volumes:
  pegasus-data:
  caddy-data:
  caddy-config:

networks:
  pegasus-net:
    driver: bridge
