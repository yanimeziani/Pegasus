name: Build & Release APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-v0.1.0-alpha}"
          cp app/build/outputs/apk/debug/app-debug.apk "pegasus-${VERSION}.apk"
          echo "APK_NAME=pegasus-${VERSION}.apk" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Pegasus ${{ env.VERSION }}"
          body: |
            ## Pegasus ${{ env.VERSION }} — OpenClaw Mobile Control Plane

            Android app for managing dragun.app infrastructure from your phone.

            ### Features
            - Login with OpenClaw API credentials
            - Dashboard: agent status, health, cost tracking
            - HITL approval queue with diff preview
            - Cost monitoring per agent
            - SSH terminal to VPS
            - Settings: API URL, SSH config

            ### Install
            Download the APK below and sideload on your Android device.
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: true
          generate_release_notes: false
