name: Build & Release APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build release APK (arm64-v8a)
        run: gradle assembleRelease

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-v0.2.0-alpha}"
          cp app/build/outputs/apk/release/app-release.apk "pegasus-${VERSION}-arm64.apk"
          echo "APK_NAME=pegasus-${VERSION}-arm64.apk" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Pegasus ${{ env.VERSION }}"
          body: |
            ## Pegasus ${{ env.VERSION }} — Cerberus Mission Control

            Release APK targeting **Android 16 (API 36) / arm64-v8a (aarch64)**.

            ### Features
            - Login with Cerberus API credentials
            - Dashboard: agent status, health, cost tracking
            - HITL approval queue with diff preview
            - Cost monitoring per agent
            - SSH terminal to VPS
            - Settings: API URL, SSH config

            ### Install
            Download the APK below and sideload on your Android 16+ arm64 device.
            ```
            adb install pegasus-${{ env.VERSION }}-arm64.apk
            ```
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: true
          generate_release_notes: false
